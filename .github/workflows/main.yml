name: Odswiez Ceny Paliw
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ustawienie Pythona
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalacja bibliotek
        # Dodajemy flagę -U (upgrade), aby na pewno zainstalować wersję z 2026 roku
        run: pip install -U requests beautifulsoup4 google-generativeai

      - name: Pobieranie danych
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python paliwo_scraper.py

      - name: Zapisanie zmian
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "PaliwoBot"
          git config --global user.email "bot@github.com"
          git add ceny.json
          # Commitujemy zmiany w pliku ceny.json
          git commit -m "Aktualizacja cen przez Gemini 3.1 Pro: $(date)" || exit 0
          # Rebase łączy zmiany bota z Twoimi zmianami z przeglądarki
          git pull --rebase origin main
          git push origin main
