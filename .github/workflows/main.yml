name: Odswiez Ceny Paliw
on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Ustawienie Pythona
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalacja bibliotek
        # DODALIŚMY google-generativeai
        run: pip install requests beautifulsoup4 google-generativeai

      - name: Pobieranie danych
        # PRZEKAZUJEMY KLUCZ Z SEKRETÓW GITHUBA DO SKRYPTU
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
        run: python paliwo_scraper.py

      - name: Zapisanie zmian
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "PaliwoBot"
          git config --global user.email "bot@github.com"
          git add ceny.json
          git commit -m "Aktualizacja cen przez AI: $(date)" || exit 0
          git pull --rebase origin main
          git push origin main
